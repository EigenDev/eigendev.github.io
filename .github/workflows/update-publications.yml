name: Update Publications from ADS

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch publications from ADS
        env:
          ADS_API_KEY: ${{ secrets.ADS_API_KEY }}
        run: |
          cd scripts
          python fetch_publications.py
          cd ..

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet _data/publications.yml; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _data/publications.yml
          git commit -m "Auto-update publications from ADS [skip ci]"
          git push

      - name: No changes detected
        if: steps.check_changes.outputs.changes == 'false'
        run: echo "No changes to publications detected."
