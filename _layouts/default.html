<!-- default.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus DuPont &mdash; eigendev-login01</title>
    <meta name="description" content="Marcus DuPont — computational astrophysicist. General-relativistic magnetohydrodynamics, astrophysical transients, and the SIMBI GPU code.">
    <meta name="keywords" content="Physics, Marcus DuPont, Princeton, Simbi, computational astrophysics, general relativistic magnetohydrodynamics, GRMHD">
    <meta name="author" content="Marcus DuPont">
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <!-- favicon -->
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

    <!-- open graph / twitter share cards -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.title | default: site.title }} — computational astrophysicist">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/og-card.png' | absolute_url }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Marcus DuPont — computational astrophysicist, terminal-themed homepage">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }} — computational astrophysicist">
    <meta name="twitter:description" content="{{ site.description }}">
    <meta name="twitter:image" content="{{ '/assets/images/og-card.png' | absolute_url }}">

    <script>
      // apply saved theme before first paint to avoid a flash of the wrong palette
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t && window.matchMedia("(prefers-color-scheme: light)").matches) t = "gruvbox-light";
          if (t && t !== "mint") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
    {{ content }}
    <script defer src="/assets/javascript/terminal.js"></script>
</body>
</html>
